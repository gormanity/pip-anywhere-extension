<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultimate PiP Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect
              x="3"
              y="5"
              width="18"
              height="14"
              rx="2.5"
              stroke="currentColor"
              stroke-width="2"
            />
            <rect
              x="12"
              y="11"
              width="7"
              height="5"
              rx="1"
              fill="currentColor"
            />
          </svg>
        </div>
        <div>
          <p class="eyebrow">Extension Settings</p>
          <h1>Ultimate PiP</h1>
        </div>
      </header>

      <form id="options-form" class="settings-panel">
        <section class="settings-section" aria-labelledby="behavior-heading">
          <div class="section-heading">
            <h2 id="behavior-heading">Behavior</h2>
          </div>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Hover overlay</strong>
              <small>Show a PiP button over video elements.</small>
            </span>
            <input
              id="hover-overlay-enabled"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Hover delay</strong>
              <small>Delay before the overlay appears.</small>
            </span>
            <div class="range-control">
              <input
                id="hover-delay-ms"
                type="range"
                min="0"
                max="2000"
                step="50"
              />
              <output id="hover-delay-output"></output>
            </div>
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Minimum video length</strong>
              <small
                >Only show the hover button for videos at least this
                long.</small
              >
            </span>
            <div class="range-control">
              <input
                id="minimum-overlay-duration"
                type="range"
                min="0"
                max="180"
                step="5"
              />
              <output id="minimum-overlay-duration-output"></output>
            </div>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Unblock video PiP</strong>
              <small>Clear video-level PiP blocks when possible.</small>
            </span>
            <input
              id="unblock-video-pip"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>
        </section>

        <section class="settings-section" aria-labelledby="controls-heading">
          <div class="section-heading">
            <h2 id="controls-heading">Controls</h2>
          </div>

          <div class="setting-row shortcut-row">
            <span class="setting-copy">
              <strong>Keyboard shortcut</strong>
              <small
                >Browser-managed shortcuts are configured in extension
                settings.</small
              >
            </span>
            <div class="shortcut-control">
              <input id="shortcut" type="text" readonly />
              <button
                id="manage-shortcut"
                class="secondary-button"
                type="button"
              >
                Manage
              </button>
            </div>
          </div>
        </section>

        <section
          id="advanced-section"
          class="settings-section"
          aria-labelledby="advanced-heading"
        >
          <div class="section-heading">
            <h2 id="advanced-heading">Advanced</h2>
          </div>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Debug logging</strong>
              <small>Log PiP decisions to the page console.</small>
            </span>
            <input
              id="debug-logging"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>
        </section>

        <footer class="action-bar">
          <span id="status" role="status" aria-live="polite"></span>
          <div class="actions">
            <button id="reset" class="secondary-button" type="button">
              Restore Defaults
            </button>
            <button class="primary-button" type="submit">Save</button>
          </div>
        </footer>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PiP Anywhere Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <header class="page-header">
        <img class="brand-mark" src="icon48.png" alt="" aria-hidden="true" />
        <div>
          <p class="eyebrow">Extension Settings</p>
          <h1>PiP Anywhere</h1>
        </div>
      </header>

      <form id="options-form" class="settings-panel">
        <div class="action-bar">
          <span id="status" role="status" aria-live="polite"></span>
          <div class="actions">
            <button id="export-settings" class="secondary-button" type="button">
              Export
            </button>
            <label class="secondary-button import-button">
              Import
              <input
                id="import-settings"
                type="file"
                accept="application/json"
              />
            </label>
            <button id="reset" class="secondary-button" type="button">
              Restore Defaults
            </button>
          </div>
        </div>

        <section
          class="settings-section"
          aria-labelledby="hover-button-heading"
        >
          <div class="section-heading">
            <h2 id="hover-button-heading">Hover Button</h2>
          </div>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Hover overlay</strong>
              <small>Show a PiP button over video elements.</small>
            </span>
            <input
              id="hover-overlay-enabled"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Hover delay</strong>
              <small>Delay before the overlay appears.</small>
            </span>
            <div class="range-control">
              <input
                id="hover-delay-ms"
                type="range"
                min="0"
                max="2000"
                step="50"
              />
              <output id="hover-delay-output"></output>
            </div>
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Minimum video length</strong>
              <small
                >Only show the hover button for videos at least this
                long.</small
              >
            </span>
            <div class="range-control">
              <input
                id="minimum-overlay-duration"
                type="range"
                min="0"
                max="180"
                step="5"
              />
              <output id="minimum-overlay-duration-output"></output>
            </div>
          </label>

          <div class="setting-row placement-row">
            <span class="setting-copy">
              <strong>Overlay placement</strong>
              <small
                >Drag the PiP button to choose where it appears over
                videos.</small
              >
            </span>
            <div class="position-control">
              <div
                id="overlay-position-picker"
                class="position-picker"
                role="application"
                aria-label="Overlay position picker"
              >
                <button
                  id="overlay-position-handle"
                  class="position-handle"
                  type="button"
                  aria-label="Overlay button position"
                >
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect
                      x="3"
                      y="5"
                      width="18"
                      height="14"
                      rx="2"
                      stroke="currentColor"
                      stroke-width="2"
                    />
                    <rect
                      x="12"
                      y="11"
                      width="7"
                      height="5"
                      rx="1"
                      fill="currentColor"
                    />
                  </svg>
                </button>
              </div>
              <div class="position-values">
                <output id="overlay-position-x-output"></output>
                <output id="overlay-position-y-output"></output>
              </div>
            </div>
          </div>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Hover icon size</strong>
              <small>Adjust the size of the button shown over videos.</small>
            </span>
            <div class="range-control">
              <input
                id="overlay-size"
                type="range"
                min="28"
                max="72"
                step="1"
              />
              <output id="overlay-size-output"></output>
            </div>
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Hover icon opacity</strong>
              <small>Make the overlay button subtler or more visible.</small>
            </span>
            <div class="range-control">
              <input
                id="overlay-opacity"
                type="range"
                min="20"
                max="100"
                step="1"
              />
              <output id="overlay-opacity-output"></output>
            </div>
          </label>

          <label class="setting-row range-row">
            <span class="setting-copy">
              <strong>Idle hide delay</strong>
              <small
                >Hide the overlay while hovered when the mouse stops
                moving.</small
              >
            </span>
            <div class="range-control">
              <input
                id="overlay-idle-hide"
                type="range"
                min="0"
                max="10000"
                step="250"
              />
              <output id="overlay-idle-hide-output"></output>
            </div>
          </label>
        </section>

        <section
          class="settings-section"
          aria-labelledby="compatibility-heading"
        >
          <div class="section-heading">
            <h2 id="compatibility-heading">Video Compatibility</h2>
          </div>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Unblock video PiP</strong>
              <small>Clear video-level PiP blocks when possible.</small>
            </span>
            <input
              id="unblock-video-pip"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>
        </section>

        <section class="settings-section" aria-labelledby="controls-heading">
          <div class="section-heading">
            <h2 id="controls-heading">Controls</h2>
          </div>

          <div class="setting-row shortcut-row">
            <span class="setting-copy">
              <strong>Keyboard shortcut</strong>
              <small
                >Browser-managed shortcuts are configured in extension
                settings.</small
              >
            </span>
            <div class="shortcut-control">
              <input id="shortcut" type="text" readonly />
              <button
                id="manage-shortcut"
                class="secondary-button"
                type="button"
              >
                Manage
              </button>
            </div>
          </div>
        </section>

        <section class="settings-section" aria-labelledby="sites-heading">
          <div class="section-heading">
            <h2 id="sites-heading">Site Rules</h2>
          </div>

          <label class="setting-row textarea-row">
            <span class="setting-copy">
              <strong>Disable on matching sites</strong>
              <small
                >One hostname or regular expression per line. Regex rules use
                /pattern/ syntax and match the full URL.</small
              >
            </span>
            <textarea
              id="disabled-site-patterns"
              rows="5"
              spellcheck="false"
            ></textarea>
          </label>
        </section>

        <section
          id="advanced-section"
          class="settings-section"
          aria-labelledby="advanced-heading"
        >
          <div class="section-heading">
            <h2 id="advanced-heading">Advanced</h2>
          </div>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>Debug logging</strong>
              <small>Log PiP decisions to the page console.</small>
            </span>
            <input
              id="debug-logging"
              class="switch"
              type="checkbox"
              role="switch"
            />
          </label>
        </section>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>

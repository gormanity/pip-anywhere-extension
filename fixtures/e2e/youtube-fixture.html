<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Shape Fixture</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: min(900px, calc(100vw - 32px));
        margin: 32px auto;
        display: grid;
        gap: 28px;
      }

      video {
        display: block;
        width: 640px;
        max-width: 100%;
        aspect-ratio: 16 / 9;
        background: #111827;
      }

      ytd-thumbnail video {
        width: 240px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>YouTube Shape Fixture</h1>
        <p>Exercises hostname and element-shape preview suppression.</p>
      </section>

      <section>
        <h2>Homepage thumbnail preview shape</h2>
        <ytd-thumbnail>
          <video
            id="youtube-thumbnail-video"
            src="/long.mp4"
            preload="metadata"
            muted
          ></video>
        </ytd-thumbnail>
      </section>

      <section>
        <h2>Watch page main player shape</h2>
        <video
          id="youtube-watch-video"
          src="/long.mp4"
          preload="metadata"
          controls
        ></video>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PiP Anywhere E2E Fixture</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: min(900px, calc(100vw - 32px));
        margin: 32px auto;
        display: grid;
        gap: 28px;
      }

      section {
        display: grid;
        gap: 10px;
      }

      video {
        width: 640px;
        max-width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        background: linear-gradient(135deg, #0f172a, #334155);
      }

      .player-shell {
        position: relative;
        width: min(640px, 100%);
      }

      .player-shell video {
        width: 100%;
      }

      .player-glass {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: end start;
        padding: 16px;
        color: white;
        background: linear-gradient(
          180deg,
          rgb(15 23 42 / 0%),
          rgb(15 23 42 / 28%)
        );
        pointer-events: auto;
      }

      .thumbnail-preview video {
        width: 240px;
      }

      .nested-video-shell {
        position: relative;
        width: min(640px, 100%);
      }

      .nested-video-shell > video {
        width: 100%;
      }

      .nested-video-shell .nested-video {
        position: absolute;
        width: 180px;
        left: 200px;
        top: 120px;
      }

      .invisible-video {
        opacity: 0;
      }

      .hidden-video {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>PiP Anywhere E2E Fixture</h1>
        <p>Videos use local generated media assets for stable tests.</p>
      </section>

      <section>
        <h2>Eligible video</h2>
        <video
          id="eligible-video"
          src="/long.mp4"
          preload="metadata"
          controls
        ></video>
      </section>

      <section>
        <h2>Short video</h2>
        <video
          id="short-video"
          src="/short.mp4"
          preload="metadata"
          controls
        ></video>
      </section>

      <section>
        <h2>Invisible videos</h2>
        <video
          id="invisible-video"
          class="invisible-video"
          src="/long.mp4"
          preload="metadata"
          controls
        ></video>
        <video
          id="hidden-video"
          class="hidden-video"
          src="/long.mp4"
          preload="metadata"
          controls
        ></video>
      </section>

      <section>
        <h2>Blocked video</h2>
        <video
          id="blocked-video"
          src="/long.mp4"
          preload="metadata"
          controls
          disablepictureinpicture
          controlslist="noremoteplayback noplaybackrate"
        ></video>
      </section>

      <section>
        <h2>Video covered by player controls</h2>
        <div class="player-shell" id="covered-player">
          <video
            id="covered-video"
            src="/long.mp4"
            preload="metadata"
            controls
          ></video>
          <div class="player-glass">Synthetic player layer</div>
        </div>
      </section>

      <section>
        <h2>Nested video candidates</h2>
        <div class="nested-video-shell">
          <video
            id="outer-video"
            src="/long.mp4"
            preload="metadata"
            controls
          ></video>
          <video
            id="nested-video"
            class="nested-video"
            src="/long.mp4"
            preload="metadata"
            controls
          ></video>
        </div>
      </section>

      <section class="thumbnail-preview">
        <h2>Muted preview</h2>
        <video id="muted-preview" muted controls></video>
      </section>

      <section>
        <h2>Dynamically inserted video</h2>
        <button id="insert-video" type="button">Insert video</button>
        <div id="dynamic-video-host"></div>
      </section>

      <section>
        <h2>Same-origin iframe video</h2>
        <iframe
          id="same-origin-frame"
          title="Same-origin video frame"
          src="/iframe-fixture.html"
        ></iframe>
      </section>
    </main>

    <script>
      const blocked = document.getElementById("blocked-video");
      window.setInterval(() => {
        blocked.disablePictureInPicture = true;
        blocked.setAttribute("disablepictureinpicture", "");
      }, 500);

      document.getElementById("insert-video").addEventListener("click", () => {
        const host = document.getElementById("dynamic-video-host");
        host.innerHTML = `
          <video
            id="dynamic-video"
            src="/long.mp4"
            preload="metadata"
            controls
          ></video>
        `;
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../assets/store-style.css" />
    <title>PiP Anywhere - Open Any Video</title>
  </head>
  <body>
    <main class="canvas">
      <section class="browser">
        <div class="browser-bar">
          <span class="dot"></span><span class="dot"></span
          ><span class="dot"></span>
          <span class="address"></span>
        </div>
        <div class="browser-body">
          <div class="video">
            <div class="video-label">hotkey · hover · toolbar</div>
            <div class="pip-button">
              <img src="../assets/pip-mark.svg" alt="" />
            </div>
            <div class="play">HTML5 video</div>
            <div class="timeline"></div>
            <div class="floating-pip"></div>
          </div>
        </div>
      </section>
      <section class="copy">
        <p class="eyebrow">PiP Anywhere</p>
        <h1>Open any video in PiP</h1>
        <p>
          Use a hotkey, hover button, or extension button to pop out eligible
          HTML5 video.
        </p>
      </section>
    </main>
  </body>
</html>

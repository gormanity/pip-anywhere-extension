<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../assets/store-style.css" />
    <title>PiP Anywhere - Hover Overlay</title>
  </head>
  <body>
    <main class="canvas">
      <section class="browser">
        <div class="browser-bar">
          <span class="dot"></span><span class="dot"></span
          ><span class="dot"></span>
          <span class="address"></span>
        </div>
        <div class="browser-body">
          <div class="video">
            <div class="pip-button">
              <img src="../assets/pip-mark.svg" alt="" />
            </div>
            <div class="play">HTML5 video</div>
            <div class="timeline"></div>
            <div class="floating-pip"></div>
          </div>
        </div>
      </section>
      <section class="copy">
        <p class="eyebrow">PiP Anywhere</p>
        <h1>Pop out video from the player</h1>
        <p>
          Hover an eligible HTML5 video and click the PiP button right where you
          are already watching.
        </p>
      </section>
    </main>
  </body>
</html>

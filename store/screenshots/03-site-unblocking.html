<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../assets/store-style.css" />
    <title>PiP Anywhere - Unblocking</title>
  </head>
  <body>
    <main class="canvas">
      <section class="browser">
        <div class="browser-bar">
          <span class="dot"></span><span class="dot"></span
          ><span class="dot"></span>
          <span class="address"></span>
        </div>
        <div class="browser-body">
          <div class="video">
            <div
              class="badge"
              style="position: absolute; left: 28px; top: 28px"
            >
              video-level block cleared
            </div>
            <div class="pip-button">
              <img src="../assets/pip-mark.svg" alt="" />
            </div>
            <div class="timeline"></div>
          </div>
        </div>
      </section>
      <section class="copy">
        <p class="eyebrow">Best-effort unblocking</p>
        <h1>Restores PiP when sites hide it</h1>
        <p>
          Clears video-level PiP opt-outs when possible while respecting
          browser-enforced restrictions.
        </p>
      </section>
    </main>
  </body>
</html>

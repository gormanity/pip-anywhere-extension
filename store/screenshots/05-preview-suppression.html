<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../assets/store-style.css" />
    <title>PiP Anywhere - Preview Suppression</title>
  </head>
  <body>
    <main class="canvas">
      <section class="browser">
        <div class="browser-bar">
          <span class="dot"></span><span class="dot"></span
          ><span class="dot"></span>
          <span class="address"></span>
        </div>
        <div class="browser-body">
          <div class="grid-page">
            <div class="thumb primary">
              <div class="pip-button">
                <img src="../assets/pip-mark.svg" alt="" />
              </div>
            </div>
            <div class="thumb"></div>
            <div class="thumb"></div>
            <div class="thumb"></div>
            <div class="thumb"></div>
            <div class="thumb"></div>
          </div>
        </div>
      </section>
      <section class="copy">
        <p class="eyebrow">Smarter surfaces</p>
        <h1>Quiet on preview-heavy pages</h1>
        <p>
          Duration gating and site-specific suppression keep thumbnail previews
          from filling the page with buttons.
        </p>
      </section>
    </main>
  </body>
</html>
